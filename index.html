<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>智慧家庭资讯 | Smart Home Daily</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg-primary: #0a0a0b;
      --bg-secondary: #111113;
      --bg-sidebar: #0f0f10;
      --bg-card: #18181b;
      --bg-card-hover: #1f1f23;
      --border: #27272a;
      --border-light: #3f3f46;
      --text-primary: #fafafa;
      --text-secondary: #a1a1aa;
      --text-muted: #71717a;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --accent-dim: rgba(59, 130, 246, 0.12);
      --tag-tech: #8b5cf6;
      --tag-policy: #10b981;
      --tag-product: #f59e0b;
      --tag-scenario: #ec4899;
      --tag-security: #ef4444;
    }
    html, body { height: 100%; }
    body { font-family: 'Inter', 'Noto Sans SC', -apple-system, sans-serif; background: var(--bg-primary); color: var(--text-primary); line-height: 1.6; }
    .layout { display: flex; min-height: 100vh; }

    .sidebar { width: 260px; flex-shrink: 0; background: var(--bg-sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; position: fixed; top: 0; left: 0; bottom: 0; z-index: 100; }
    .sidebar-header { padding: 20px 16px; border-bottom: 1px solid var(--border); }
    .logo { display: flex; align-items: center; gap: 10px; }
    .logo-icon { width: 32px; height: 32px; background: linear-gradient(135deg, var(--accent), #8b5cf6); border-radius: 8px; display: flex; align-items: center; justify-content: center; }
    .logo-icon svg { width: 18px; height: 18px; color: white; }
    .logo-text { font-size: 16px; font-weight: 600; letter-spacing: -0.01em; }
    .logo-text span { color: var(--accent); }

    .sidebar-tabs { display: flex; padding: 12px 12px 0; gap: 4px; border-bottom: 1px solid var(--border); }
    .sidebar-tab { flex: 1; padding: 10px 8px; text-align: center; font-size: 13px; font-weight: 500; color: var(--text-muted); border-radius: 8px 8px 0 0; cursor: pointer; transition: all 0.2s; border-bottom: 2px solid transparent; margin-bottom: -1px; }
    .sidebar-tab:hover { color: var(--text-secondary); background: var(--bg-card); }
    .sidebar-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

    .sidebar-nav { flex: 1; overflow-y: auto; padding: 12px; }
    .nav-date-list { display: flex; flex-direction: column; gap: 2px; }
    .nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 8px; cursor: pointer; transition: all 0.15s; font-size: 13px; }
    .nav-item:hover { background: var(--bg-card); }
    .nav-item.active { background: var(--accent-dim); }
    .nav-item.active .nav-item-date { color: var(--accent); font-weight: 600; }
    .nav-item.active .nav-item-indicator { background: var(--accent); }
    .nav-item-indicator { width: 6px; height: 6px; background: var(--border-light); border-radius: 50%; flex-shrink: 0; }
    .nav-item.has-news .nav-item-indicator { background: var(--accent); }
    .nav-item-date { color: var(--text-secondary); }
    .nav-item-day { color: var(--text-muted); font-size: 12px; margin-left: auto; }
    .nav-item-week { color: var(--text-muted); font-size: 12px; }
    .nav-item-count { font-size: 11px; color: var(--text-muted); margin-left: auto; background: var(--bg-secondary); padding: 2px 6px; border-radius: 4px; }

    .main { flex: 1; margin-left: 260px; min-height: 100vh; }
    .main-header { position: sticky; top: 0; z-index: 50; background: rgba(10, 10, 11, 0.9); backdrop-filter: blur(16px); border-bottom: 1px solid var(--border); padding: 0 32px; }
    .main-header-inner { display: flex; align-items: center; justify-content: space-between; height: 56px; }
    .main-title { font-size: 15px; font-weight: 500; color: var(--text-secondary); }
    .main-title span { color: var(--accent); }
    .main-meta { font-size: 13px; color: var(--text-muted); }

    .content { padding: 24px 32px; max-width: 1000px; }
    .section-header { margin-bottom: 24px; }
    .section-vol { font-size: 12px; color: var(--text-muted); margin-bottom: 4px; }
    .section-title { font-size: 22px; font-weight: 600; letter-spacing: -0.01em; }

    .stats-bar { display: flex; align-items: center; gap: 16px; padding: 14px 18px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 28px; font-size: 13px; }
    .stats-bar .total { color: var(--text-primary); font-weight: 600; }
    .stats-bar .dup { color: var(--tag-scenario); }
    .stats-bar .divider { width: 1px; height: 16px; background: var(--border); }
    .stats-bar .mode-label { color: var(--text-muted); }

    .cat-section { margin-bottom: 32px; }
    .cat-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
    .cat-title { font-size: 15px; font-weight: 600; color: var(--text-primary); }
    .cat-count { font-size: 12px; color: var(--text-muted); background: var(--bg-secondary); padding: 2px 8px; border-radius: 4px; }

    .news-list { display: flex; flex-direction: column; gap: 16px; }
    .news-item { 
      padding: 20px; background: var(--bg-card); border: 1px solid var(--border); 
      border-radius: 12px; transition: all 0.15s; cursor: pointer; 
    }
    .news-item:hover { background: var(--bg-card-hover); border-color: var(--border-light); }
    .news-item .item-header { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 12px; }
    .news-item .item-index { 
      width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; 
      background: var(--bg-secondary); border-radius: 8px; font-size: 14px; font-weight: 700; 
      color: var(--accent); flex-shrink: 0; 
    }
    .news-item .item-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .news-item .item-meta .date-badge { font-size: 11px; color: var(--text-muted); background: var(--bg-secondary); padding: 2px 6px; border-radius: 4px; border: 1px solid var(--border); }
    .news-item .item-title { font-size: 16px; font-weight: 600; line-height: 1.4; margin-bottom: 10px; }
    .news-item .item-summary { font-size: 14px; color: var(--text-secondary); line-height: 1.7; margin-bottom: 14px; }
    .news-item .item-footer { display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
    .news-item .item-tags { display: flex; gap: 6px; flex-wrap: wrap; }
    .news-item .item-links { display: flex; align-items: center; gap: 12px; font-size: 12px; color: var(--text-muted); }

    .card-tag { display: inline-flex; align-items: center; padding: 3px 8px; border-radius: 5px; font-size: 11px; font-weight: 600; text-transform: uppercase; }
    .card-tag.tech { background: rgba(139,92,246,0.15); color: var(--tag-tech); }
    .card-tag.policy { background: rgba(16,185,129,0.15); color: var(--tag-policy); }
    .card-tag.product { background: rgba(245,158,11,0.15); color: var(--tag-product); }
    .card-tag.scenario { background: rgba(236,72,153,0.15); color: var(--tag-scenario); }
    .card-tag.security { background: rgba(239,68,68,0.15); color: var(--tag-security); }

    .keyword-tag { padding: 3px 8px; background: var(--bg-secondary); border-radius: 4px; font-size: 11px; color: var(--text-muted); }

    .news-item .item-link { 
      display: inline-flex; align-items: center; gap: 4px; 
      color: var(--accent); font-size: 13px; font-weight: 500; 
      text-decoration: none; transition: color 0.2s;
    }
    .news-item .item-link:hover { color: var(--accent-hover); text-decoration: underline; }

    .period-list { display: flex; flex-direction: column; gap: 12px; }
    .period-card { padding: 18px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; cursor: pointer; transition: all 0.15s; }
    .period-card:hover { background: var(--bg-card-hover); border-color: var(--border-light); }
    .period-card .period-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .period-card .period-title { font-size: 15px; font-weight: 600; }
    .period-card .period-range { font-size: 12px; color: var(--text-muted); }
    .period-card .period-preview { font-size: 13px; color: var(--text-secondary); line-height: 1.5; }
    .period-card .period-footer { display: flex; align-items: center; gap: 12px; margin-top: 12px; font-size: 12px; color: var(--text-muted); }

    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .loading { text-align: center; padding: 60px; color: var(--text-muted); }

    @media (max-width: 768px) { .sidebar { width: 220px; } .main { margin-left: 220px; } .content { padding: 16px; } }
    @media (max-width: 600px) { .sidebar { display: none; } .main { margin-left: 0; } }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <div class="logo-icon">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" /></svg>
          </div>
          <div class="logo-text">智慧<span>家庭</span></div>
        </div>
      </div>
      <div class="sidebar-tabs">
        <div class="sidebar-tab active" data-tab="daily">日报</div>
        <div class="sidebar-tab" data-tab="weekly">周报</div>
        <div class="sidebar-tab" data-tab="monthly">月报</div>
      </div>
      <div class="sidebar-nav">
        <div id="nav-daily" class="nav-date-list tab-content active"><div class="loading">加载中...</div></div>
        <div id="nav-weekly" class="nav-date-list tab-content"><div class="loading">加载中...</div></div>
        <div id="nav-monthly" class="nav-date-list tab-content"><div class="loading">加载中...</div></div>
      </div>
    </aside>

    <main class="main">
      <div class="main-header">
        <div class="main-header-inner">
          <div class="main-title" id="mainTitle">智慧家庭资讯日报</div>
          <div class="main-meta" id="mainMeta">加载中...</div>
        </div>
      </div>
      <div class="content">
        <div id="content-daily" class="tab-content active"><div class="loading">加载中...</div></div>
        <div id="content-weekly" class="tab-content"><div class="loading">加载中...</div></div>
        <div id="content-monthly" class="tab-content"><div class="loading">加载中...</div></div>
      </div>
    </main>
  </div>

  <script>
    let allNews = [];
    let lastUpdated = '';

    async function loadData() {
      try {
        const response = await fetch('./data.json');
        const data = await response.json();
        allNews = data.news || [];
        lastUpdated = data.lastUpdated || '';
        initApp();
      } catch (e) {
        console.error('Failed to load data:', e);
        document.querySelectorAll('.loading').forEach(el => el.textContent = '数据加载失败，请刷新重试');
      }
    }

    function formatDate(dateStr) {
      const d = new Date(dateStr);
      return `${d.getMonth()+1}月${d.getDate()}日`;
    }

    function formatDateFull(dateStr) {
      const d = new Date(dateStr);
      const weekdays = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];
      return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日 ${weekdays[d.getDay()]}`;
    }

    function getWeekNumber(d) {
      const date = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
      const dayNum = date.getUTCDay() || 7;
      date.setUTCDate(date.getUTCDate() + 4 - dayNum);
      const yearStart = new Date(Date.UTC(date.getUTCFullYear(), 0, 1));
      return Math.ceil((((date - yearStart) / 86400000) + 1) / 7);
    }

    function getWeekRange(dateStr) {
      const d = new Date(dateStr);
      const year = d.getFullYear();
      const week = getWeekNumber(d);
      const firstDay = new Date(year, 0, 1 + (week - 1) * 7);
      const lastDay = new Date(firstDay);
      lastDay.setDate(lastDay.getDate() + 6);
      return `${firstDay.getMonth()+1}/${firstDay.getDate()}-${lastDay.getMonth()+1}/${lastDay.getDate()}`;
    }

    function countDuplicates() {
      const titles = allNews.map(n => n.title);
      const unique = new Set(titles);
      return titles.length - unique.size;
    }

    function getDailyData() {
      const byDate = {};
      allNews.forEach(n => { if (!byDate[n.date]) byDate[n.date] = []; byDate[n.date].push(n); });
      return byDate;
    }

    function getWeeklyData() {
      const byWeek = {};
      allNews.forEach(n => {
        const d = new Date(n.date);
        const key = `${d.getFullYear()}-W${String(getWeekNumber(d)).padStart(2, '0')}`;
        if (!byWeek[key]) byWeek[key] = [];
        byWeek[key].push(n);
      });
      return byWeek;
    }

    function getMonthlyData() {
      const byMonth = {};
      allNews.forEach(n => {
        const ym = n.date.substring(0, 7);
        if (!byMonth[ym]) byMonth[ym] = [];
        byMonth[ym].push(n);
      });
      return byMonth;
    }

    let currentTab = 'daily';

    document.querySelectorAll('.sidebar-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        currentTab = tab.dataset.tab;
        document.querySelectorAll('.sidebar-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.getElementById(`nav-${currentTab}`).classList.add('active');
        document.getElementById(`content-${currentTab}`).classList.add('active');
        updateHeader();
      });
    });

    function updateHeader() {
      const meta = document.getElementById('mainMeta');
      const title = document.getElementById('mainTitle');
      if (lastUpdated) {
        const d = new Date(lastUpdated);
        meta.textContent = `最后更新: ${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')} | 共 ${allNews.length} 条`;
      }
      title.innerHTML = currentTab === 'daily' ? '智慧家庭资讯日报' : currentTab === 'weekly' ? '智慧家庭资讯周报' : '智慧家庭资讯月报';
    }

    function renderNavDaily() {
      const byDate = getDailyData();
      const dates = Object.keys(byDate).sort().reverse();
      const nav = document.getElementById('nav-daily');
      const dayNames = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
      if (dates.length === 0) {
        nav.innerHTML = '<div class="loading">暂无数据</div>';
        return;
      }
      nav.innerHTML = dates.map(d => {
        const dd = new Date(d);
        const count = byDate[d].length;
        return `<div class="nav-item ${d === dates[0] ? 'active' : ''}" data-date="${d}">
          <div class="nav-item-indicator has-news"></div>
          <div class="nav-item-date">${formatDate(d)}</div>
          <div class="nav-item-count">${count}条</div>
        </div>`;
      }).join('');

      nav.querySelectorAll('.nav-item').forEach(item => {
        item.addEventListener('click', () => {
          nav.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
          item.classList.add('active');
          renderDailyContent(item.dataset.date);
        });
      });
    }

    function renderNavWeekly() {
      const byWeek = getWeeklyData();
      const weeks = Object.keys(byWeek).sort().reverse();
      const nav = document.getElementById('nav-weekly');
      if (weeks.length === 0) {
        nav.innerHTML = '<div class="loading">暂无数据</div>';
        return;
      }
      nav.innerHTML = weeks.map(w => {
        const count = byWeek[w].length;
        return `<div class="nav-item ${w === weeks[0] ? 'active' : ''}" data-week="${w}">
          <div class="nav-item-indicator has-news"></div>
          <div class="nav-item-date">${w.replace('-W', ' 第')} 周</div>
          <div class="nav-item-count">${count}条</div>
        </div>`;
      }).join('');

      nav.querySelectorAll('.nav-item').forEach(item => {
        item.addEventListener('click', () => {
          nav.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
          item.classList.add('active');
          renderWeeklyContent(item.dataset.week);
        });
      });
    }

    function renderNavMonthly() {
      const byMonth = getMonthlyData();
      const months = Object.keys(byMonth).sort().reverse();
      const nav = document.getElementById('nav-monthly');
      if (months.length === 0) {
        nav.innerHTML = '<div class="loading">暂无数据</div>';
        return;
      }
      nav.innerHTML = months.map(m => {
        const count = byMonth[m].length;
        const [year, month] = m.split('-');
        return `<div class="nav-item ${m === months[0] ? 'active' : ''}" data-month="${m}">
          <div class="nav-item-indicator has-news"></div>
          <div class="nav-item-date">${year}年${parseInt(month)}月</div>
          <div class="nav-item-count">${count}条</div>
        </div>`;
      }).join('');

      nav.querySelectorAll('.nav-item').forEach(item => {
        item.addEventListener('click', () => {
          nav.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
          item.classList.add('active');
          renderMonthlyContent(item.dataset.month);
        });
      });
    }

    function renderDailyContent(date) {
      const byDate = getDailyData();
      const news = byDate[date] || [];
      const container = document.getElementById('content-daily');
      const catNames = { tech: '技术前沿', policy: '政策标准', product: '产品方案', scenario: '场景落地', security: '数据安全' };
      const categories = {};
      news.forEach(n => { if (!categories[n.category]) categories[n.category] = []; categories[n.category].push(n); });

      let catHtml = '';
      Object.keys(categories).forEach(cat => {
        const items = categories[cat];
        catHtml += `<div class="cat-section">
          <div class="cat-header">
            <span class="cat-title">📌 ${catNames[cat]}</span>
            <span class="cat-count">${items.length} 条</span>
          </div>
          <div class="news-list">${items.map((item, i) => `
            <div class="news-item">
              <div class="item-header">
                <div class="item-index">${String(i+1).padStart(2,'0')}</div>
                <div class="item-meta">
                  <span class="card-tag ${item.category}">${item.categoryLabel}</span>
                  <span class="date-badge">📅 ${item.published || item.date}</span>
                  ${item.keywords ? item.keywords.slice(0, 2).map(k => `<span class="keyword-tag">${k}</span>`).join('') : ''}
                </div>
              </div>
              <div class="item-title">${item.title}</div>
              <div class="item-summary">${item.summary}</div>
              <div class="item-footer">
                <div class="item-tags">
                  ${item.keywords ? item.keywords.map(k => `<span class="keyword-tag">${k}</span>`).join('') : ''}
                </div>
                <div class="item-links">
                  <span>📰 ${item.source || '未知来源'}</span>
                  ${item.url ? `<a href="${item.url}" target="_blank" class="item-link">🔗 阅读原文 →</a>` : ''}
                </div>
              </div>
            </div>`).join('')}</div>
        </div>`;
      });

      container.innerHTML = `<div class="section-header">
          <div class="section-vol">${formatDateFull(date)}</div>
          <div class="section-title">📋 今日资讯 · 共 ${news.length} 条</div>
        </div>
        <div class="stats-bar">
          <span class="total">📊 平台总计 ${allNews.length} 条</span>
          <span class="divider"></span>
          <span class="dup">🔄 重复 ${countDuplicates()} 条</span>
          <span class="divider"></span>
          <span class="mode-label">📅 日报模式</span>
        </div>
        ${catHtml || '<div class="loading">暂无数据</div>'}`;
    }

    function renderWeeklyContent(week) {
      const byWeek = getWeeklyData();
      const news = byWeek[week] || [];
      const container = document.getElementById('content-weekly');
      container.innerHTML = `<div class="section-header">
          <div class="section-vol">${week.replace('-W', ' 年第')} 周</div>
          <div class="section-title">📋 本周资讯 · 共 ${news.length} 条</div>
        </div>
        <div class="stats-bar">
          <span class="total">📊 平台总计 ${allNews.length} 条</span>
          <span class="divider"></span>
          <span class="dup">🔄 重复 ${countDuplicates()} 条</span>
          <span class="divider"></span>
          <span class="mode-label">📆 周报模式</span>
        </div>
        <div class="period-list">${news.map(item => `
          <div class="period-card">
            <div class="period-header">
              <div class="period-title">${item.date} · ${item.categoryLabel || item.category}</div>
              <span class="card-tag ${item.category}">${item.categoryLabel || item.category}</span>
            </div>
            <div class="period-preview">${item.title}</div>
            <div class="period-summary" style="font-size:13px;color:var(--text-secondary);margin-top:8px;">${item.summary || ''}</div>
            <div class="period-footer">
              <span>📰 ${item.source || '未知来源'}</span>
              ${item.url ? `<a href="${item.url}" target="_blank" style="color:var(--accent);font-size:12px;">🔗 阅读原文</a>` : ''}
            </div>
          </div>`).join('')}</div>`;
    }

    function renderMonthlyContent(month) {
      const byMonth = getMonthlyData();
      const news = byMonth[month] || [];
      const container = document.getElementById('content-monthly');
      container.innerHTML = `<div class="section-header">
          <div class="section-vol">${month}</div>
          <div class="section-title">📋 本月资讯 · 共 ${news.length} 条</div>
        </div>
        <div class="stats-bar">
          <span class="total">📊 平台总计 ${allNews.length} 条</span>
          <span class="divider"></span>
          <span class="dup">🔄 重复 ${countDuplicates()} 条</span>
          <span class="divider"></span>
          <span class="mode-label">🗓️ 月报模式</span>
        </div>
        <div class="period-list">${news.map(item => `
          <div class="period-card">
            <div class="period-header">
              <div class="period-title">${item.date} · ${item.categoryLabel || item.category}</div>
              <span class="card-tag ${item.category}">${item.categoryLabel || item.category}</span>
            </div>
            <div class="period-preview">${item.title}</div>
            <div class="period-summary" style="font-size:13px;color:var(--text-secondary);margin-top:8px;">${item.summary || ''}</div>
            <div class="period-footer">
              <span>📰 ${item.source || '未知来源'}</span>
              ${item.url ? `<a href="${item.url}" target="_blank" style="color:var(--accent);font-size:12px;">🔗 阅读原文</a>` : ''}
            </div>
          </div>`).join('')}</div>`;
    }

    function initApp() {
      renderNavDaily();
      renderNavWeekly();
      renderNavMonthly();
      const byDate = getDailyData();
      const dates = Object.keys(byDate).sort().reverse();
      if (dates.length > 0) renderDailyContent(dates[0]);
      updateHeader();
    }

    loadData();
  </script>
</body>
</html>
